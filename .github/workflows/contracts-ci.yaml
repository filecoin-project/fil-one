name: 'CI [contracts]'

on:
  push:
    branches: [main]
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge version
        run: |
          forge --version

      - name: Format
        run: |
          forge fmt --check
        id: fmt

      - name: Build
        run: |
          forge build --sizes
        id: build

      - name: Test
        run: |
          forge test -vvv
        id: test
