name: 'Check pull requests for production'

on:
  pull_request:
    branches: [production]

jobs:
  verify-production-commits-on-main:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check if all commits exist on main
        id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "${{ github.event.pull_request.head.sha }}" origin/main; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Post comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const result = '${{ steps.check.outputs.result }}';
            const body = result === 'pass'
              ? '✅ All commits in this PR exist on `main`.'
              : [
                  '> [!CAUTION]',
                  '> **This PR contains commits not present on `main`.**',
                  '> Please merge them to `main` and verify the staging deployment first.',
                ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
