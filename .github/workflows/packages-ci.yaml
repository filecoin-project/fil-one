name: 'CI [packages]'

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-packages:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Enable pnpm via Corepack
        run: |
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin" pnpm
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # sst.config.ts uses SST globals ($config, $app, sst, aws, etc.) whose
      # type definitions live in .sst/platform/ and are not checked into git.
      # Run `sst install` to generate them so oxlint's type-aware checks pass.
      - name: Generate SST provider types
        run: npx sst install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: [check-packages]
    runs-on: ubuntu-latest
    concurrency: deploy-staging
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::654654381893:role/hyperspace-infra-staging-github
          aws-region: us-east-2

      - run: pnpm build

      - run: npx sst deploy --stage staging
