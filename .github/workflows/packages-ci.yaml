name: 'CI [packages]'

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-packages:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # sst.config.ts uses SST globals ($config, $app, sst, aws, etc.) whose
      # type definitions live in .sst/platform/ and are not checked into git.
      # Run `sst install` to generate them so oxlint's type-aware checks pass.
      - name: Generate SST provider types
        run: npx sst install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
