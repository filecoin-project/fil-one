name: 'CI [packages]'

on:
  push:
    branches: [main, production]
  pull_request:

jobs:
  check-packages:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # Pin the first pnpm/action-setup commit that declares a Node 24 runtime.
      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # sst.config.ts uses SST globals ($config, $app, sst, aws, etc.) whose
      # type definitions live in .sst/platform/ and are not checked into git.
      # Run `sst install` to generate them so oxlint's type-aware checks pass.
      - name: Generate SST provider types
        run: pnpm exec sst install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'production' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [check-packages]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: preview
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
      AWS_REGION: us-east-2
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      webhook-status: ${{ steps.webhook-check.outputs.status }}
      sst-env-dirty: ${{ steps.sst-env-check.outputs.dirty }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # Pin the first pnpm/action-setup commit that declares a Node 24 runtime.
      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Set SST secrets
        run: |
          pnpm exec sst secret set Auth0ClientId "$AUTH0_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0ClientSecret "$AUTH0_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtClientId "$AUTH0_MGMT_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtClientSecret "$AUTH0_MGMT_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtRuntimeClientId "$AUTH0_MGMT_RUNTIME_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtRuntimeClientSecret "$AUTH0_MGMT_RUNTIME_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage "$STAGE"
          pnpm exec sst secret set StripePriceId "$STRIPE_PRICE_ID" --stage "$STAGE"
          pnpm exec sst secret set AuroraBackofficeToken "$AURORA_BACKOFFICE_TOKEN" --stage "$STAGE"
          pnpm exec sst secret set SendGridApiKey "$SENDGRID_API_KEY" --stage "$STAGE"
          pnpm exec sst secret set GrafanaLokiAuth "$GRAFANA_LOKI_AUTH" --stage "$STAGE"
          pnpm exec sst secret set GrafanaPrometheusAuth "$GRAFANA_PROMETHEUS_AUTH" --stage "$STAGE"
          npx sst secret set StripePublishableKey "$STRIPE_PUBLISHABLE_KEY" --stage "$STAGE"
        env:
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
          AUTH0_MGMT_RUNTIME_CLIENT_ID: ${{ secrets.AUTH0_MGMT_RUNTIME_CLIENT_ID }}
          AUTH0_MGMT_RUNTIME_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_RUNTIME_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          AURORA_BACKOFFICE_TOKEN: ${{ secrets.AURORA_BACKOFFICE_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          GRAFANA_LOKI_AUTH: ${{ secrets.GRAFANA_LOKI_AUTH }}
          GRAFANA_PROMETHEUS_AUTH: ${{ secrets.GRAFANA_PROMETHEUS_AUTH }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}

      - name: Build
        run: pnpm build

      - name: Deploy SST stage
        run: pnpm exec sst deploy --stage "$STAGE"

      - name: Extract preview URL
        id: deploy
        run: |
          URL=$(pnpm exec sst state export --stage "$STAGE" | jq -r '.latest.resources[] | select(.type == "pulumi:pulumi:Stack") | .outputs.baseUrl')
          URL_TRIMMED=$(printf '%s' "$URL" | xargs)
          if [ -z "$URL_TRIMMED" ] || [ "$URL_TRIMMED" = "null" ]; then
            echo "::error::Failed to extract preview URL from SST state"
            exit 1
          fi
          echo "url=$URL_TRIMMED" >> "$GITHUB_OUTPUT"

      - name: Install Stripe CLI
        if: success()
        run: |
          curl -s https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public \
            | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" \
            | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update && sudo apt-get install -y stripe

      - name: Check Stripe webhook registration
        if: success()
        id: webhook-check
        continue-on-error: true
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          WEBHOOK_URL="${PREVIEW_URL}/api/stripe/webhook"
          STRIPE_STDERR=$(mktemp)

          if STRIPE_OUTPUT=$(stripe webhook_endpoints list --limit 100 --api-key "$STRIPE_API_KEY" 2>"$STRIPE_STDERR"); then
            MATCH=$(printf '%s\n' "$STRIPE_OUTPUT" \
              | jq -r --arg url "$WEBHOOK_URL" '.data[] | select(.url == $url) | .id' \
              | head -1)
            if [ -n "$MATCH" ]; then
              echo "status=✅ Registered (\`$MATCH\`)" >> "$GITHUB_OUTPUT"
            else
              echo "status=⚠️ Not found" >> "$GITHUB_OUTPUT"
            fi
          else
            STRIPE_ERROR=$(tr '\n' ' ' < "$STRIPE_STDERR" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
            if [ -n "$STRIPE_ERROR" ]; then
              echo "status=⚠️ Check failed (\`$STRIPE_ERROR\`)" >> "$GITHUB_OUTPUT"
            else
              echo "status=⚠️ Check failed" >> "$GITHUB_OUTPUT"
            fi
          fi

          rm -f "$STRIPE_STDERR"
      - name: Check sst-env.d.ts files are up to date
        id: sst-env-check
        run: |
          if [ -n "$(git status --porcelain -- ':(glob)**/sst-env.d.ts')" ]; then
            echo "dirty=true" >> "$GITHUB_OUTPUT"
          fi

  check-sst-env:
    needs: [deploy-preview]
    if: needs.deploy-preview.outputs.sst-env-dirty == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::sst-env.d.ts files are out of date. Please run 'sst deploy' locally and commit the updated sst-env.d.ts files."
          exit 1

  integration-tests:
    needs: [deploy-preview]
    if: needs.deploy-preview.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: tests-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    env:
      SST_STAGE: pr-${{ github.event.pull_request.number }}
      AWS_REGION: us-east-2
    outputs:
      integration-result: ${{ steps.integration-tests.outcome }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # Pin the first pnpm/action-setup commit that declares a Node 24 runtime.
      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Install Stripe CLI
        run: |
          curl -s https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public \
            | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" \
            | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update && sudo apt-get install -y stripe

      # Events list must match WEBHOOK_EVENTS in setup-integrations.ts
      - name: Start Stripe CLI webhook forwarding
        id: stripe-listen
        env:
          STRIPE_API_KEY: ${{ secrets.CI_STRIPE_SECRET_KEY }}
          WEBHOOK_URL: ${{ needs.deploy-preview.outputs.url }}/api/stripe/webhook
        run: |
          LOGFILE=$(mktemp)
          stripe listen \
            --api-key "$STRIPE_API_KEY" \
            --forward-to "$WEBHOOK_URL" \
            --events customer.updated,customer.subscription.created,customer.subscription.updated,customer.subscription.deleted,customer.subscription.trial_will_end,invoice.payment_succeeded,invoice.payment_failed \
            > "$LOGFILE" 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

          # Wait for signing secret
          for i in $(seq 1 60); do
            SECRET=$(grep -o 'whsec_[A-Za-z0-9]*' "$LOGFILE" 2>/dev/null | head -1) || true
            [ -n "$SECRET" ] && break
            sleep 1
          done

          # Mask the secret so GitHub Actions redacts it from all subsequent log lines
          if [ -n "$SECRET" ]; then
            echo "::add-mask::$SECRET"
          fi

          if [ -z "$SECRET" ]; then
            echo "::error::Failed to extract stripe listen signing secret"
            sed 's/whsec_[A-Za-z0-9]*/whsec_***REDACTED***/g' "$LOGFILE"
            exit 1
          fi

          # Save the original SSM value before overwriting
          ORIGINAL_SECRET=$(aws ssm get-parameter \
            --name "/filone/${SST_STAGE}/stripe-webhook-secret" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text 2>/dev/null) || ORIGINAL_SECRET=""
          if [[ "$ORIGINAL_SECRET" == whsec_* ]]; then
            echo "::add-mask::$ORIGINAL_SECRET"
            printf '%s' "$ORIGINAL_SECRET" > /tmp/.stripe-webhook-original
            echo "has-original=true" >> "$GITHUB_OUTPUT"
          fi

          # Update SSM with the stripe listen secret
          aws ssm put-parameter \
            --name "/filone/${SST_STAGE}/stripe-webhook-secret" \
            --value "$SECRET" \
            --type SecureString \
            --overwrite > /dev/null
          echo "SSM updated with stripe listen signing secret"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run integration tests
        id: integration-tests
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.url }}
        run: pnpm test:integration

      - name: Stop Stripe CLI forwarding
        if: always() && steps.stripe-listen.outputs.pid != ''
        run: kill ${{ steps.stripe-listen.outputs.pid }} 2>/dev/null || true

      - name: Restore original Stripe webhook secret in SSM
        if: always() && steps.stripe-listen.outputs.has-original == 'true'
        run: |
          ORIGINAL_SECRET=$(cat /tmp/.stripe-webhook-original)
          aws ssm put-parameter \
            --name "/filone/${SST_STAGE}/stripe-webhook-secret" \
            --value "$ORIGINAL_SECRET" \
            --type SecureString \
            --overwrite > /dev/null
          echo "SSM restored with original webhook signing secret"

  comment:
    name: Add Preview Environment Comment on PR
    if: always() && github.event_name == 'pull_request' && needs.deploy-preview.result != 'skipped'
    needs: [deploy-preview, integration-tests]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '🚀 Preview Environment'

      - name: Create or update comment (success)
        if: needs.deploy-preview.result == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Preview Environment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ✅ Deploy successful |
            | **Preview URL** | [${{ needs.deploy-preview.outputs.url }}](${{ needs.deploy-preview.outputs.url }}) |
            | **Stripe Webhook** | ${{ needs.deploy-preview.outputs.webhook-status || '⚠️ Check skipped' }} |

            ### 🧪 Test Results

            | Suite | Status |
            |-------|--------|
            | **Integration Tests** | ${{ needs.integration-tests.outputs.integration-result == 'success' && '✅ Passed' || (needs.integration-tests.outputs.integration-result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |

            **Workflow** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Create or update comment (failure)
        if: needs.deploy-preview.result == 'failure'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Preview Environment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ❌ Deploy failed |
            | **Workflow logs** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

      - name: Create or update comment (cancelled)
        if: needs.deploy-preview.result == 'cancelled'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Preview Environment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ⚠️ Deploy cancelled |
            | **Workflow logs** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    needs: [check-packages]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      cancel-in-progress: false
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read
    env:
      DEPLOY_STAGE: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # Pin the first pnpm/action-setup commit that declares a Node 24 runtime.
      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - run: pnpm build
        env:
          SENTRY_DEPLOY_ENV: ${{ env.DEPLOY_STAGE }}
          SENTRY_RELEASE_DIST: ${{ github.run_number }}

      - run: pnpm exec sst deploy --stage "$DEPLOY_STAGE"

      - if: failure()
        id: commit_info
        run: echo "subject=$(git log -1 --format=%s)" >> "$GITHUB_OUTPUT"

      - if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": ${{ toJSON(format('Deployment of `{0}` to `{1}` failed. Commit: {2} by @{3}. Details: {4}/{5}/actions/runs/{6}', github.event.repository.name, env.DEPLOY_STAGE, steps.commit_info.outputs.subject, github.actor, github.server_url, github.repository, github.run_id)) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format(':warning: *Deployment of `{0}` to `{1}` failed* · <{2}/{3}/actions/runs/{4}|Details>', github.event.repository.name, env.DEPLOY_STAGE, github.server_url, github.repository, github.run_id)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('Commit: `{0}` by <https://github.com/{1}|@{1}>', steps.commit_info.outputs.subject, github.actor)) }}
                  }
                }
              ]
            }

  dispatch-telemetry:
    needs: [check-packages, deploy-preview, integration-tests, comment, deploy]
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
