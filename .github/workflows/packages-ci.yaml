name: 'CI [packages]'

on:
  push:
    branches: [main, production]
  pull_request:

jobs:
  check-packages:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # sst.config.ts uses SST globals ($config, $app, sst, aws, etc.) whose
      # type definitions live in .sst/platform/ and are not checked into git.
      # Run `sst install` to generate them so oxlint's type-aware checks pass.
      - name: Generate SST provider types
        run: pnpm exec sst install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  check-storybook:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test Stories
        run: pnpm test:storybook

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'production' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [check-packages]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
      AWS_REGION: us-east-2
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      sst-env-dirty: ${{ steps.sst-env-check.outputs.dirty }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Set SST secrets
        run: |
          pnpm exec sst secret set Auth0ClientId "$AUTH0_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0ClientSecret "$AUTH0_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtClientId "$AUTH0_MGMT_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtClientSecret "$AUTH0_MGMT_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtRuntimeClientId "$AUTH0_MGMT_RUNTIME_CLIENT_ID" --stage "$STAGE"
          pnpm exec sst secret set Auth0MgmtRuntimeClientSecret "$AUTH0_MGMT_RUNTIME_CLIENT_SECRET" --stage "$STAGE"
          pnpm exec sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage "$STAGE"
          pnpm exec sst secret set StripePriceId "$STRIPE_PRICE_ID" --stage "$STAGE"
          pnpm exec sst secret set AuroraBackofficeToken "$AURORA_BACKOFFICE_TOKEN" --stage "$STAGE"
          pnpm exec sst secret set SendGridApiKey "$SENDGRID_API_KEY" --stage "$STAGE"
          pnpm exec sst secret set GrafanaLokiAuth "$GRAFANA_LOKI_AUTH" --stage "$STAGE"
          pnpm exec sst secret set GrafanaPrometheusAuth "$GRAFANA_PROMETHEUS_AUTH" --stage "$STAGE"
          npx sst secret set StripePublishableKey "$STRIPE_PUBLISHABLE_KEY" --stage "$STAGE"
        env:
          AUTH0_CLIENT_ID: ${{ secrets.CI_AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.CI_AUTH0_CLIENT_SECRET }}
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.CI_AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.CI_AUTH0_MGMT_CLIENT_SECRET }}
          AUTH0_MGMT_RUNTIME_CLIENT_ID: ${{ secrets.CI_AUTH0_MGMT_RUNTIME_CLIENT_ID }}
          AUTH0_MGMT_RUNTIME_CLIENT_SECRET: ${{ secrets.CI_AUTH0_MGMT_RUNTIME_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.CI_STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.CI_STRIPE_PRICE_ID }}
          AURORA_BACKOFFICE_TOKEN: ${{ secrets.CI_AURORA_BACKOFFICE_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.CI_SENDGRID_API_KEY }}
          GRAFANA_LOKI_AUTH: ${{ secrets.CI_GRAFANA_LOKI_AUTH }}
          GRAFANA_PROMETHEUS_AUTH: ${{ secrets.CI_GRAFANA_PROMETHEUS_AUTH }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.CI_STRIPE_PUBLISHABLE_KEY }}

      - name: Build
        run: pnpm build

      - name: Deploy SST stage
        run: pnpm exec sst deploy --stage "$STAGE"

      - name: Extract preview URL
        id: deploy
        run: |
          URL=$(pnpm exec sst state export --stage "$STAGE" | jq -r '.latest.resources[] | select(.type == "pulumi:pulumi:Stack") | .outputs.baseUrl')
          URL_TRIMMED=$(printf '%s' "$URL" | xargs)
          if [ -z "$URL_TRIMMED" ] || [ "$URL_TRIMMED" = "null" ]; then
            echo "::error::Failed to extract preview URL from SST state"
            exit 1
          fi
          echo "url=$URL_TRIMMED" >> "$GITHUB_OUTPUT"

      - name: Check sst-env.d.ts files are up to date
        id: sst-env-check
        run: |
          if [ -n "$(git status --porcelain -- ':(glob)**/sst-env.d.ts')" ]; then
            echo "dirty=true" >> "$GITHUB_OUTPUT"
          fi

  check-sst-env:
    needs: [deploy-preview]
    if: needs.deploy-preview.outputs.sst-env-dirty == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::sst-env.d.ts files are out of date. Please run 'sst deploy' locally and commit the updated sst-env.d.ts files."
          exit 1

  comment:
    name: Add Preview Environment Comment on PR
    if: github.event_name == 'pull_request' && needs.deploy-preview.outputs.url != ''
    needs: [deploy-preview]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '🚀 Preview Environment'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Preview Environment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ✅ Deploy successful |
            | **Preview URL** | [${{ needs.deploy-preview.outputs.url }}](${{ needs.deploy-preview.outputs.url }}) |

  integration-tests:
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'production' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [deploy-preview]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      SST_STAGE: pr-${{ github.event.pull_request.number }}
      AWS_REGION: us-east-2

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Run integration tests
        run: pnpm test:integration

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    needs: [check-packages]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      cancel-in-progress: false
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read
    env:
      DEPLOY_STAGE: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - run: pnpm build
        env:
          SENTRY_DEPLOY_ENV: ${{ env.DEPLOY_STAGE }}
          SENTRY_RELEASE_DIST: ${{ github.run_number }}

      - run: pnpm exec sst deploy --stage "$DEPLOY_STAGE"

      - if: failure()
        id: commit_info
        run: echo "subject=$(git log -1 --format=%s)" >> "$GITHUB_OUTPUT"

      - if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": ${{ toJSON(format('Deployment of `{0}` to `{1}` failed. Commit: {2} by @{3}. Details: {4}/{5}/actions/runs/{6}', github.event.repository.name, env.DEPLOY_STAGE, steps.commit_info.outputs.subject, github.actor, github.server_url, github.repository, github.run_id)) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format(':warning: *Deployment of `{0}` to `{1}` failed* · <{2}/{3}/actions/runs/{4}|Details>', github.event.repository.name, env.DEPLOY_STAGE, github.server_url, github.repository, github.run_id)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('Commit: `{0}` by <https://github.com/{1}|@{1}>', steps.commit_info.outputs.subject, github.actor)) }}
                  }
                }
              ]
            }

  dispatch-telemetry:
    needs: [check-packages, check-storybook, deploy-preview, comment, integration-tests, deploy]
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
