name: GHA Workflow Telemetry

on:
  # NOTE: workflow_run requires an explicit list — wildcards are not supported.
  # Update this list when adding or renaming workflows.
  workflow_run:
    workflows:
      - 'CI [packages]'
      - 'CI [contracts]'
      - 'Preview Teardown'
    types:
      - completed

permissions:
  actions: read

jobs:
  send-telemetry:
    if: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          # Derive environment from the branch that triggered the workflow.
          # TODO: Add "production" once we have a production deployment workflow.
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "value=staging" >> "$GITHUB_OUTPUT"
          else
            echo "value=ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Export OpenTelemetry data
        uses: paper2/github-actions-opentelemetry@e1027e95ff4cc4022e36a0fc03c44f402430bee6 # v0.10.0
        env:
          OTEL_SERVICE_NAME: filone-ci
          OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-us-central-0.grafana.net/otlp
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${{ steps.env.outputs.value }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
