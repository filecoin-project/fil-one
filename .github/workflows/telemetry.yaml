name: GHA Workflow Telemetry

on:
  repository_dispatch:
    types: [workflow-telemetry]

permissions:
  actions: read

jobs:
  send-telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch workflow run details
        id: run_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.client_payload.run_id }}"
          run_data=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '{workflow_id, head_branch, name}')
          WORKFLOW_ID=$(echo "$run_data" | jq -r '.workflow_id')
          HEAD_BRANCH=$(echo "$run_data" | jq -r '.head_branch')
          WORKFLOW_NAME=$(echo "$run_data" | jq -r '.name')

          echo "workflow_id=${WORKFLOW_ID}" >> "$GITHUB_OUTPUT"
          echo "head_branch=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "workflow_name=${WORKFLOW_NAME}" >> "$GITHUB_OUTPUT"

          echo "## Observed workflow run" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run ID:** ${RUN_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Workflow:** ${WORKFLOW_NAME} (id: ${WORKFLOW_ID})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${HEAD_BRANCH}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check if first run for this workflow+branch
        id: is_first_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api_path="/repos/${{ github.repository }}/actions/workflows/${{ steps.run_info.outputs.workflow_id }}/runs"
          branch="${{ steps.run_info.outputs.head_branch }}"
          count=$(gh api "$api_path" -f "branch=$branch" -f status=completed -f per_page=1 --jq '.total_count') || true
          echo "Completed runs count: ${count:-(empty/failed)}"

          # Leave the output empty if the API call failed.
          if [[ -n "$count" ]]; then
            if [[ "$count" -le 1 ]]; then
              echo "value=true" >> "$GITHUB_OUTPUT"
            else
              echo "value=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Export OpenTelemetry data
        uses: paper2/github-actions-opentelemetry@e1027e95ff4cc4022e36a0fc03c44f402430bee6 # v0.10.0
        env:
          WORKFLOW_RUN_ID: ${{ github.event.client_payload.run_id }}
          OTEL_SERVICE_NAME: filone-ci
          OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-us-central-0.grafana.net/otlp
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          OTEL_RESOURCE_ATTRIBUTES: >-
            deployment.environment=ci,
            vcs.repository.ref.name=${{ steps.run_info.outputs.head_branch }},
            ci.pipeline.name=${{ steps.run_info.outputs.workflow_name }},
            ci.pipeline.first_run=${{ steps.is_first_run.outputs.value }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
