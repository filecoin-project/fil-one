name: GHA Workflow Telemetry

on:
  # NOTE: workflow_run requires an explicit list — wildcards are not supported.
  # Update this list when adding or renaming workflows.
  workflow_run:
    workflows:
      - 'CI [packages]'
      - 'CI [contracts]'
      - 'Preview Teardown'
    types:
      - completed

permissions:
  actions: read

jobs:
  send-telemetry:
    if: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Check if first run for this workflow+branch
        id: is_first_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_run.workflow_id refers to the observed workflow (e.g. CI [packages]),
          # not the telemetry workflow that runs this step.
          count=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/${{ github.event.workflow_run.workflow_id }}/runs?branch=${{ github.event.workflow_run.head_branch }}&status=completed" \
            --jq '.total_count')
          if [[ "$count" -le 1 ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Export OpenTelemetry data
        uses: paper2/github-actions-opentelemetry@e1027e95ff4cc4022e36a0fc03c44f402430bee6 # v0.10.0
        env:
          OTEL_SERVICE_NAME: filone-ci
          OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-us-central-0.grafana.net/otlp
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          OTEL_RESOURCE_ATTRIBUTES: >-
            deployment.environment=ci,
            vcs.repository.ref.name=${{ github.event.workflow_run.head_branch }},
            ci.pipeline.name=${{ github.event.workflow_run.name }},
            ci.pipeline.first_run=${{ steps.is_first_run.outputs.value }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
