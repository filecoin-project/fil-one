name: 'CI [e2e]'
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      STAGE: e2e-${{ github.event.pull_request.number || github.run_id }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::654654381893:role/hyperspace-infra-staging-github
        aws-region: us-east-2

    - name: Set SST secrets
      run: |
        npx sst secret set Auth0ClientId "$AUTH0_CLIENT_ID" --stage "$STAGE"
        npx sst secret set Auth0ClientSecret "$AUTH0_CLIENT_SECRET" --stage "$STAGE"
        npx sst secret set Auth0MgmtClientId "$AUTH0_MGMT_CLIENT_ID" --stage "$STAGE"
        npx sst secret set Auth0MgmtClientSecret "$AUTH0_MGMT_CLIENT_SECRET" --stage "$STAGE"
        npx sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage "$STAGE"
        npx sst secret set StripePriceId "$STRIPE_PRICE_ID" --stage "$STAGE"
        npx sst secret set AuroraBackofficeToken "$AURORA_BACKOFFICE_TOKEN" --stage "$STAGE"
      env:
        AUTH0_CLIENT_ID: ${{ secrets.E2E_AUTH0_CLIENT_ID }}
        AUTH0_CLIENT_SECRET: ${{ secrets.E2E_AUTH0_CLIENT_SECRET }}
        AUTH0_MGMT_CLIENT_ID: ${{ secrets.E2E_AUTH0_MGMT_CLIENT_ID }}
        AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.E2E_AUTH0_MGMT_CLIENT_SECRET }}
        STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
        STRIPE_PRICE_ID: ${{ secrets.E2E_STRIPE_PRICE_ID }}
        AURORA_BACKOFFICE_TOKEN: ${{ secrets.E2E_AURORA_BACKOFFICE_TOKEN }}

    - name: Build
      run: pnpm build

    - name: Deploy SST stage
      id: deploy
      run: |
        OUTPUT=$(npx sst deploy --stage "$STAGE" 2>&1)
        echo "$OUTPUT"
        URL=$(echo "$OUTPUT" | grep -oP 'url:\s*\K\S+' || true)
        echo "url=$URL" >> "$GITHUB_OUTPUT"

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run Playwright tests
      run: pnpm test:e2e
      env:
        BASE_URL: ${{ steps.deploy.outputs.url }}

    - name: Teardown SST stage
      if: always()
      run: npx sst remove --stage "$STAGE"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
