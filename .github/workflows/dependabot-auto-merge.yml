name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Generate fil-one-bot app token
        id: app-token
        uses: actions/create-github-app-token@6c0f2b2b6b3f0e2f8f4b7f4d5d4f0d8b6d7d6a4d # v3
        with:
          client-id: ${{ secrets.FIL_ONE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.FIL_ONE_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
