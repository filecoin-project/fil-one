version: 2

updates:
  # ── npm (pnpm) dependencies ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
    labels:
      - dependencies
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
          - '@smithy/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      tanstack:
        patterns:
          - '@tanstack/*'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
      stripe:
        patterns:
          - 'stripe'
          - '@stripe/*'
      sst:
        patterns:
          - 'sst'
          - '@sst/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      middy:
        patterns:
          - '@middy/*'

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - '*'

  # ── Python (pip) dependencies ──
  - package-ecosystem: pip
    directory: /tests/s3compat
    schedule:
      interval: weekly
      day: thursday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    labels:
      - dependencies
    groups:
      pytest:
        patterns:
          - 'pytest'
          - 'pytest-*'
      boto:
        patterns:
          - 'boto3'
          - 'botocore'

  # ── Git submodules ──
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 3
    labels:
      - dependencies
      - submodule
